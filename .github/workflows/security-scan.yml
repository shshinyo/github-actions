# ============================================================
# security-scan.yml
# Comprehensive security scanning pipeline:
#   - CodeQL static analysis (SAST) for JS/TS/Python
#   - Dependency review (blocks PRs with new CVEs)
#   - Gitleaks — prevent secret commits
#   - Trivy — IaC misconfiguration scanning
#   - OWASP ZAP — DAST (dynamic API scanning)
#   - Upload all results to GitHub Security tab (SARIF)
# ============================================================
name: 🛡️ Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * 1'    # Weekly deep scan every Monday at 2am
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pull-requests: write
  security-events: write   # upload SARIF to Security tab

jobs:
  # ----------------------------------------------------------
  # Job 1: CodeQL — Static Analysis (SAST)
  # Detects SQL injection, XSS, path traversal, etc.
  # ----------------------------------------------------------
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    strategy:
      matrix:
        language: [javascript-typescript]

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'
          upload: Always    # always upload, even on failure

  # ----------------------------------------------------------
  # Job 2: Dependency Review — block PRs with new CVEs
  # ----------------------------------------------------------
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          # fail-on-severity: high         # block HIGH + CRITICAL
          # allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0   # copyleft — check with legal

  # ----------------------------------------------------------
  # Job 3: Gitleaks — prevent secrets from being committed
  # ----------------------------------------------------------
  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0     # full history scan

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Note: gitleaks-action v2 automatically uploads to the Security tab 
        # when GITHUB_TOKEN is provided. No manual upload-sarif step needed!

  # ----------------------------------------------------------
  # Job 4: Trivy — IaC, Dockerfile, and filesystem scanning
  # ----------------------------------------------------------
  trivy-scan:
    name: Trivy IaC & FS Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Scan the repo filesystem (deps + IaC misconfigs)
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: 'vuln,secret,misconfig'
          format: sarif
          output: trivy-fs.sarif
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true     # reduce noise from unfixable issues

      - name: Upload Trivy FS SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

      # Scan for IaC misconfigurations (only if terraform directory exists)
      - name: Trivy IaC scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .      # Scan entire repo for any IaC (Dockerfile, docker-compose, etc)
          format: sarif
          output: trivy-iac.sarif
          exit-code: '0'

      - name: Upload Trivy IaC SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: hashFiles('**/*.tf', '**/*.yaml', '**/Dockerfile') != ''
        with:
          sarif_file: trivy-iac.sarif
          category: trivy-iac

  # ----------------------------------------------------------
  # Job 5: OWASP ZAP — DAST against staging API
  # Only runs on main branch (staging must be deployed first)
  # ----------------------------------------------------------
  dast-zap:
    name: DAST — OWASP ZAP
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      # NOTE: This scan requires a live staging/production URL to work.
      # It is commented out by default to prevent build failures.
      # - name: Run ZAP API Scan
      #   uses: zaproxy/action-api-scan@v0.7.0
      #   with:
      #     target: 'https://staging.myapp.com/api/openapi.json' # REPLACE WITH YOUR URL
