# Linear pipeline: install → test → build → deploy (GitHub Pages on main).
#
# If deploy fails with HttpError 404 / "Failed to create deployment", enable Pages for
# Actions-based builds (not "Deploy from a branch"):
#   Repo → Settings → Pages → Build and deployment → Source: GitHub Actions
#   https://github.com/<owner>/<repo>/settings/pages
#
name: Install, Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-test:
    name: Install, test & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test:ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          VITE_BASE: /${{ github.event.repository.name }}/

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
