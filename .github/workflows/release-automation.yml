# ============================================================
# release-automation.yml
# Full release automation using semantic-release:
#   - Auto-bumps version (MAJOR/MINOR/PATCH) from commit msgs
#   - Generates CHANGELOG.md
#   - Creates GitHub Release with notes
#   - Publishes to npm registry
#   - Triggers downstream Docker build
#   - Posts release summary to Slack
# Commit message convention (Conventional Commits):
#   feat: ...       → MINOR bump
#   fix: ...        → PATCH bump
#   feat!: ... or BREAKING CHANGE: → MAJOR bump
# ============================================================
name: 🚀 Release Automation

on:
  push:
    branches: [main]

permissions:
  contents: write          # create tags + GitHub Release
  issues: write            # close relevant issues on release
  pull-requests: write     # update PR with release info
  id-token: write          # npm provenance attestation

jobs:
  # ----------------------------------------------------------
  # Job 1: Create release with semantic-release
  # ----------------------------------------------------------
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
      release-url: ${{ steps.release.outputs.url }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0            # full history needed for changelog
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # semantic-release reads GITHUB_TOKEN for API calls
      - name: Run Semantic Release
        id: release
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 23
          # Plugins are already installed via npm ci in package.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Print release info
        if: steps.release.outputs.released == 'true'
        run: |
          echo "🎉 Released version: ${{ steps.release.outputs.version }}"
          echo "📦 Release URL: ${{ steps.release.outputs.url }}"

  # ----------------------------------------------------------
  # Job 2: Trigger Docker build for newly released version
  # ----------------------------------------------------------
  trigger-docker:
    name: Trigger Docker Build
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Docker workflow via dispatch
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: new-release
          client-payload: |
            {
              "version": "${{ needs.release.outputs.version }}",
              "sha": "${{ github.sha }}"
            }

  # ----------------------------------------------------------
  # Job 3: Update GitHub Pages docs site
  # ----------------------------------------------------------
  deploy-docs:
    name: Deploy Documentation
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Build documentation
        run: npm run docs:build

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vuepress/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  # ----------------------------------------------------------
  # Job 4: Notify team on Slack
  # ----------------------------------------------------------
  notify:
    name: Notify Team
    needs: [release, deploy-docs]
    if: always() && needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Send Slack release announcement
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: 'C0123RELEASES'
          payload: |
            {
              "text": "🚀 *v${{ needs.release.outputs.version }}* released!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🚀 *New Release: v${{ needs.release.outputs.version }}*\n<${{ needs.release.outputs.release-url }}|View Release Notes>\n\nDeployed by: @${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
